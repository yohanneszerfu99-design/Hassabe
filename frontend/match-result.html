<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassabe — Your Match Result</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased;background:#0C0902;color:#2A1C06}

/* ── APPROVED RESULT ── */
.result-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px;position:relative;overflow:hidden}

/* Background glow */
.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);z-index:0}
.bg-glow.approved{background:radial-gradient(circle,rgba(201,168,76,.08) 0%,transparent 65%)}
.bg-glow.declined{background:radial-gradient(circle,rgba(60,60,60,.15) 0%,transparent 65%)}

.inner{position:relative;z-index:1;width:100%;max-width:520px}

/* Logo */
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:#FAF0DC;text-align:center;margin-bottom:40px}
.logo span{color:#C9A84C}

/* ── APPROVED STATE ── */
.approved-wrap{}

/* Celebration ornament */
.celebration{text-align:center;margin-bottom:28px;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.celebration-icon{font-family:'Cormorant Garamond',serif;font-size:44px;color:#C9A84C;margin-bottom:6px}
.celebration h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:400;color:#FAF0DC;line-height:1.05;margin-bottom:6px}
.celebration h1 em{font-style:italic;color:#C9A84C}
.celebration p{font-size:14px;font-weight:300;color:rgba(232,213,163,.5);line-height:1.7}

/* Both-users row */
.pair-row{
  display:flex;align-items:center;justify-content:center;gap:0;
  margin-bottom:24px;animation:fadeUp .6s .15s both;
}
.pair-user{text-align:center;flex:1}
.pair-av{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.06));
  border:1.5px solid rgba(201,168,76,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#C9A84C;
  margin:0 auto 6px;
}
.pair-name{font-size:13px;color:rgba(232,213,163,.7)}
.pair-connector{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:0 16px;flex-shrink:0;
}
.pair-score{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:400;color:#C9A84C;line-height:1}
.pair-score-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(201,168,76,.4)}

/* Score card */
.score-card{
  background:rgba(201,168,76,.04);border:.5px solid rgba(201,168,76,.18);
  border-radius:10px;padding:22px 24px;margin-bottom:16px;
  animation:fadeUp .6s .25s both;
}
.score-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.score-card-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.45)}
.score-badge{
  font-family:'Cormorant Garamond',serif;font-size:22px;color:#C9A84C;font-weight:500;
  background:rgba(201,168,76,.1);border:.5px solid rgba(201,168,76,.25);
  padding:3px 12px;border-radius:4px;
}
.dim-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dim-bar-lbl{font-size:11px;color:rgba(232,213,163,.4);width:140px;flex-shrink:0}
.dim-bar-track{flex:1;height:2px;background:rgba(201,168,76,.1);position:relative}
.dim-bar-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,#8B6914,#C9A84C);transition:width 1.5s cubic-bezier(.25,.46,.45,.94)}
.dim-bar-val{font-size:11px;font-weight:500;color:#C9A84C;width:32px;text-align:right;flex-shrink:0}
.score-sub{font-size:11px;color:rgba(232,213,163,.28);margin-top:12px;padding-top:12px;border-top:.5px solid rgba(201,168,76,.08);line-height:1.6}

/* AI summary */
.ai-summary{
  border:.5px solid rgba(201,168,76,.18);border-radius:10px;
  padding:20px 22px;margin-bottom:16px;
  background:rgba(201,168,76,.03);
  animation:fadeUp .6s .35s both;
}
.ai-summary-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.4);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ai-summary-text{font-size:14px;color:rgba(232,213,163,.7);line-height:1.75;font-style:italic;margin-bottom:14px}
.shared-vals{display:flex;flex-wrap:wrap;gap:6px}
.shared-val{
  padding:4px 11px;border-radius:10px;font-size:11px;
  background:rgba(201,168,76,.1);color:rgba(201,168,76,.8);
  border:.5px solid rgba(201,168,76,.2);
}

/* Icebreakers */
.icebreakers{
  border:.5px solid rgba(201,168,76,.15);border-radius:10px;
  padding:18px 20px;margin-bottom:16px;
  animation:fadeUp .6s .4s both;
}
.ib-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.38);margin-bottom:12px}
.ib-q{
  display:flex;gap:10px;font-size:13px;color:rgba(232,213,163,.6);
  padding:8px 0;border-bottom:.5px solid rgba(201,168,76,.07);line-height:1.55;
}
.ib-q:last-child{border-bottom:none}
.ib-n{color:rgba(201,168,76,.45);flex-shrink:0;font-size:11px;margin-top:2px}

/* Payment gate */
.payment-gate{
  background:#0C0902;border-radius:12px;padding:28px 24px;
  text-align:center;margin-bottom:16px;
  border:1px solid rgba(201,168,76,.22);
  animation:fadeUp .6s .5s both;
}
.pay-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.4);margin-bottom:6px}
.pay-price{font-family:'Cormorant Garamond',serif;font-size:64px;font-weight:400;color:#C9A84C;line-height:1;margin:8px 0}
.pay-desc{font-size:13px;color:rgba(232,213,163,.45);line-height:1.7;max-width:320px;margin:0 auto 20px}
.pay-features{display:flex;flex-direction:column;gap:7px;margin-bottom:20px;text-align:left}
.pay-feature{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(232,213,163,.5)}
.pay-feature::before{content:'✓';color:rgba(201,168,76,.7);flex-shrink:0}
.pay-btn{
  width:100%;padding:15px;background:#C9A84C;color:#0C0902;
  border:none;border-radius:4px;font-family:'Jost',sans-serif;
  font-size:14px;font-weight:500;letter-spacing:.04em;cursor:pointer;
  transition:background .2s;
}
.pay-btn:hover{background:#E8D5A3}
.pay-security{font-size:11px;color:rgba(232,213,163,.22);margin-top:12px;line-height:1.6}

/* ── DECLINED STATE ── */
.declined-wrap{text-align:center;padding:20px 0;animation:fadeUp .5s ease}
.declined-icon{
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:28px;color:rgba(232,213,163,.35);
  margin:0 auto 24px;
}
.declined-h{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:400;color:#FAF0DC;margin-bottom:10px;line-height:1.15}
.declined-p{font-size:14px;font-weight:300;color:rgba(232,213,163,.45);line-height:1.8;margin-bottom:28px;max-width:380px;margin-left:auto;margin-right:auto}
.declined-card{
  background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.08);
  border-radius:8px;padding:20px 22px;text-align:left;margin-bottom:20px;
}
.declined-card-title{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,213,163,.3);margin-bottom:10px}
.declined-item{display:flex;gap:10px;font-size:13px;color:rgba(232,213,163,.5);padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.05);line-height:1.5}
.declined-item:last-child{border-bottom:none}
.declined-item span{color:rgba(201,168,76,.6);flex-shrink:0}

/* Shared buttons */
.btn-row{display:flex;gap:10px;margin-top:8px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:4px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;width:100%}
.btn-gold{background:#C9A84C;color:#0C0902}
.btn-gold:hover{background:#E8D5A3}
.btn-outline{background:transparent;color:rgba(232,213,163,.6);border:.5px solid rgba(201,168,76,.25)}
.btn-outline:hover{background:rgba(201,168,76,.06);color:rgba(232,213,163,.85)}
.btn-spinner{display:none;width:15px;height:15px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite}
.btn.loading .btn-spinner{display:block}
.btn.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#1A1208;color:#E8D5A3;padding:10px 20px;border-radius:3px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;border:.5px solid rgba(201,168,76,.22)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .result-page{padding:32px 16px 60px}
  .pay-price{font-size:52px}
  .pair-av{width:60px;height:60px;font-size:20px}
  .pair-score{font-size:38px}
}
</style>
</head>
<body>

<div class="result-page" id="result-page">
  <!-- State injected by JS based on ?result=approved|declined -->
</div>
<div id="toast"></div>

<script>
'use strict';
const API = window.HASSABE_CONFIG.API;

/* ── Read result from URL or mock ── */
const params   = new URLSearchParams(window.location.search);
const RESULT   = params.get('result') || 'approved'; // 'approved' | 'declined'
const MATCH_ID = params.get('matchId') || 'match-001';

/* ── Mock match data (replaced by API call in production) ── */
const MATCH_DATA = {
  approved: {
    combinedScore: 91,
    r1Score:       87,
    r2Score:       94,
    myInitials:    'ST',
    myName:        'You',
    partnerInitials:'SR',
    partnerName:   'Sara',
    scoreBreakdown: {
      'Core Values':        95,
      'Cultural Alignment': 90,
      'Faith':              92,
      'Family & Roles':     89,
      'Communication':      88,
      'Life Goals':         91,
      'Lifestyle':          87,

    compatibilitySummary: 'An exceptional alignment across both rounds — your values, faith, family goals, and communication styles are deeply compatible. You both show emotional readiness and clear marriage intent with similar timelines. The AI found no meaningful friction points.',

      'What does a meaningful Sunday morning look like in your household?',

      'What has living in the diaspora taught you about yourself?',
    ],
  },
  declined: {
    combinedScore: 58,
    r1Score:       72,
    r2Score:       48,
  },
};

/* ── Init ── */
(async function init() {
       const res = await fetch(`${API}/api/matches/${MATCH_ID}`, {
       headers: { 'Authorization': `Bearer ${token}` }
     });
     const { match } = await res.json();
     const approved = match.status === 'approved' || match.status === 'messaging_unlocked';
     renderResult(approved ? 'approved' : 'declined', match);
  renderResult(RESULT, MATCH_DATA[RESULT]);
})();

/* ── APPROVED SCREEN ── */
function renderApproved(d) {
  const dimRows = Object.entries(d.scoreBreakdown).map(([lbl, val]) => `
    <div class="dim-bar-row">
      <div class="dim-bar-lbl">${lbl}</div>
      <div class="dim-bar-track"><div class="dim-bar-fill" data-w="${val}" style="width:0"></div></div>
      <div class="dim-bar-val">${val}%</div>
    </div>`).join('');

  const sharedVals = (d.sharedValues || []).map(v => `<div class="shared-val">${v}</div>`).join('');
  const iceBreakers = (d.icebreakers || []).map((q, i) => `
    <div class="ib-q"><span class="ib-n">${i+1}.</span><span>${q}</span></div>`).join('');

  return `
  <div class="approved-wrap">
    <div class="celebration">
      <div class="celebration-icon">★</div>
      <h1>Your match is<br><em>confirmed</em></h1>
      <p>You and ${d.partnerName} have both passed both rounds of compatibility screening.</p>
    </div>

    <div class="pair-row">
      <div class="pair-user">
        <div class="pair-av">${d.myInitials}</div>
        <div class="pair-name">${d.myName}</div>
      </div>
      <div class="pair-connector">
        <div class="pair-score">${d.combinedScore}%</div>
        <div class="pair-score-lbl">Combined</div>
      </div>
      <div class="pair-user">
        <div class="pair-av">${d.partnerInitials}</div>
        <div class="pair-name">${d.partnerName}</div>
      </div>
    </div>

    <!-- Score breakdown -->
    <div class="score-card">
      <div class="score-card-header">
        <div class="score-card-title">Compatibility Breakdown</div>
        <div style="display:flex;gap:10px">
          <div style="text-align:center">
            <div style="font-family:'Cormorant Garamond',serif;font-size:16px;color:rgba(201,168,76,.6)">R1</div>
            <div class="score-badge" style="font-size:16px">${d.r1Score}%</div>
          </div>
          <div style="text-align:center">
            <div style="font-family:'Cormorant Garamond',serif;font-size:16px;color:rgba(201,168,76,.6)">R2</div>
            <div class="score-badge" style="font-size:16px">${d.r2Score}%</div>
          </div>
        </div>
      </div>
      ${dimRows}
      <div class="score-sub">
        Combined score = Round 1 (${d.r1Score}% × 40%) + Round 2 (${d.r2Score}% × 60%) = ${d.combinedScore}%
        &nbsp;·&nbsp; Approval threshold: 68%
      </div>
    </div>

    <!-- AI Summary -->
    <div class="ai-summary">
      <div class="ai-summary-label">✦ AI Compatibility Insight</div>
      <div class="ai-summary-text">"${d.compatibilitySummary}"</div>
      <div class="shared-vals">${sharedVals}</div>
    </div>

    <!-- Icebreakers -->
    <div class="icebreakers">
      <div class="ib-label">✦ AI-Generated Conversation Starters — ready when you unlock</div>
      ${iceBreakers}
    </div>

    <!-- Payment gate -->
    <div class="payment-gate" id="payment-gate">
      <div class="pay-label">One-time conversation unlock</div>
      <div class="pay-price">$49.99</div>
      <div class="pay-desc">Unlock your private conversation with ${d.partnerName}. Your icebreakers are waiting.</div>
      <div class="pay-features">
        <div class="pay-feature">Private chat — text and voice notes</div>
        <div class="pay-feature">AI-generated icebreakers delivered in-chat</div>
        <div class="pay-feature">30-day conversation window</div>
        <div class="pay-feature">Secure payment via Stripe</div>
      </div>
      <button class="pay-btn" id="pay-btn" onclick="initiatePayment()">
        <span class="btn-text">Unlock Conversation →</span>
        <div class="btn-spinner" style="display:none"></div>
      </button>
      <div class="pay-security">🔒 Secure payment via Stripe &nbsp;·&nbsp; No subscription &nbsp;·&nbsp; Cancel anytime</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-outline" onclick="goTo('/matches')">Back to Matches</button>
    </div>
  </div>`;
}

/* ── DECLINED SCREEN ── */
function renderDeclined(d) {
  return `
  <div class="declined-wrap">
    <div class="declined-icon">—</div>
    <h2 class="declined-h">This match was<br>not advanced</h2>
    <p class="declined-p">
      After reviewing compatibility across both rounds, the combined score did not meet the threshold required to proceed.
      This is not a reflection of your worth or your match's — it means the AI identified meaningful differences that could create friction over time.
    </p>

    <div class="declined-card">
      <div class="declined-card-title">What this means</div>
      <div class="declined-item"><span>◆</span>Your combined score (${d.combinedScore}%) was below the 68% approval threshold</div>
      <div class="declined-item"><span>◆</span>Neither of you will be able to message the other</div>
      <div class="declined-item"><span>◆</span>Your questionnaire answers are preserved and continue to improve future matches</div>
      <div class="declined-item"><span>◆</span>The engine runs nightly — new matches may be found at any time</div>
    </div>

    <div class="declined-card">
      <div class="declined-card-title">What you can do now</div>
      <div class="declined-item"><span>→</span>Review your profile and make sure it fully reflects who you are</div>
      <div class="declined-item"><span>→</span>Check for other active matches in your dashboard</div>
      <div class="declined-item"><span>→</span>Complete your profile to 100/100 to maximise your match pool visibility</div>
    </div>

    <div class="btn-row" style="margin-top:20px">
      <button class="btn btn-gold" onclick="goTo('/dashboard')">Back to Dashboard →</button>
    </div>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-outline" onclick="goTo('/profile')">Review My Profile</button>
    </div>
  </div>`;
}

/* ── Payment ── */
async function initiatePayment() {
  const btn = document.getElementById('pay-btn');
  btn.classList.add('loading');
  btn.querySelector('.btn-spinner').style.display = 'block';
  btn.querySelector('.btn-text').style.opacity = '0.7';
  btn.disabled = true;

  — Stripe Checkout (built in Step 8):
          const res = await fetch(`${API}/api/payments/checkout`, {
       method: 'POST',
       headers: window.Auth.headers(),
       body: JSON.stringify({ matchId: MATCH_ID })
     });
     const { url } = await res.json();
     window.location.href = url; // Redirect to Stripe hosted checkout

  await sleep(1200);
  toast('Redirecting to Stripe checkout… (Step 8 wires this up)');
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.querySelector('.btn-spinner').style.display = 'none';
    btn.querySelector('.btn-text').style.opacity = '1';
    btn.disabled = false;
  }, 2000);
}

/* ── Demo toggle (remove in production) ── */
function toggleDemo() {
  const cur = new URLSearchParams(window.location.search).get('result') || 'approved';
  renderResult(cur === 'approved' ? 'declined' : 'approved', MATCH_DATA[cur === 'approved' ? 'declined' : 'approved']);
}

function goTo(path) {
  toast(`Navigating to ${path}…`);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let toastT;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>

<!-- Demo toggle — remove in production -->
<div style="position:fixed;bottom:20px;right:20px;z-index:100">
  <button onclick="toggleDemo()" style="padding:8px 14px;background:rgba(201,168,76,.15);color:rgba(201,168,76,.7);border:.5px solid rgba(201,168,76,.3);border-radius:4px;font-family:'Jost',sans-serif;font-size:11px;cursor:pointer;letter-spacing:.06em">Toggle Approved/Declined</button>
</div>
</body>
