<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round 2 Questionnaire — Hassabe ሃሳቤ</title>
<meta name="description" content="Complete Round 2 of your Hassabe compatibility questionnaire with your match.">
<meta name="theme-color" content="#0C0902">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/logo.png">
<link rel="apple-touch-icon" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="image" href="/assets/logo.png">
<script src="/js/config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Jost',sans-serif;background:#FDF8F0;-webkit-font-smoothing:antialiased;color:#2A1C06}

/* ── SHELL ── */
.shell{display:flex;min-height:100vh}

/* ══ LEFT CONTEXT PANEL ══ */
.ctx{
  width:290px;flex-shrink:0;background:#0C0902;
  display:flex;flex-direction:column;padding:36px 28px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.ctx-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:#FAF0DC;margin-bottom:6px;text-decoration:none;display:block}
.ctx-logo span{color:#C9A84C}
.ctx-sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.38);margin-bottom:32px}

/* Match card in sidebar */
.ctx-match{
  background:rgba(201,168,76,.06);border:.5px solid rgba(201,168,76,.18);
  border-radius:8px;padding:16px;margin-bottom:24px;
}
.ctx-match-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.4);margin-bottom:10px}
.ctx-match-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ctx-av{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.06));
  border:1.5px solid rgba(201,168,76,.35);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#C9A84C;
}
.ctx-name{font-size:13px;font-weight:500;color:#FAF0DC;margin-bottom:1px}
.ctx-match-sub{font-size:11px;color:rgba(232,213,163,.45)}
.ctx-score-row{display:flex;align-items:center;justify-content:space-between}
.ctx-score-num{font-family:'Cormorant Garamond',serif;font-size:28px;color:#C9A84C;font-weight:500;line-height:1}
.ctx-score-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(201,168,76,.4)}
.ctx-score-bar{flex:1;height:2px;background:rgba(201,168,76,.12);border-radius:1px;margin:0 12px;overflow:hidden}
.ctx-score-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,#8B6914,#C9A84C)}

/* Timer */
.ctx-timer{
  background:rgba(255,255,255,.04);border:.5px solid rgba(201,168,76,.12);
  border-radius:6px;padding:12px 14px;margin-bottom:24px;
}
.ctx-timer-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.38);margin-bottom:8px}
.ctx-timer-row{display:flex;align-items:baseline;gap:6px}
.ctx-timer-num{font-family:'Cormorant Garamond',serif;font-size:32px;color:#FAF0DC;font-weight:400;line-height:1}
.ctx-timer-unit{font-size:11px;color:rgba(201,168,76,.45);margin-top:2px}
.ctx-timer-bar{height:2px;background:rgba(201,168,76,.12);border-radius:1px;margin-top:8px;overflow:hidden}
.ctx-timer-fill{height:100%;border-radius:1px;background:#C9A84C;transition:width 60s linear}
.ctx-timer-warn .ctx-timer-num{color:#E88C4C}
.ctx-timer-urgent .ctx-timer-num{color:#E84C4C}

/* Dimension nav */
.ctx-dims-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.35);margin-bottom:10px}
.ctx-dim{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;border-bottom:.5px solid rgba(201,168,76,.06)}
.ctx-dim:last-child{border-bottom:none}
.ctx-dim-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:rgba(201,168,76,.18);transition:all .25s}
.ctx-dim.done .ctx-dim-dot{background:#27AE60}
.ctx-dim.active .ctx-dim-dot{background:#C9A84C;box-shadow:0 0 6px rgba(201,168,76,.5)}
.ctx-dim.partial .ctx-dim-dot{background:#F39C12}
.ctx-dim-lbl{font-size:12px;color:rgba(232,213,163,.3);transition:color .2s;flex:1}
.ctx-dim.active .ctx-dim-lbl,.ctx-dim.done .ctx-dim-lbl{color:rgba(232,213,163,.7)}
.ctx-dim.partial .ctx-dim-lbl{color:rgba(232,213,163,.55)}
.ctx-dim-cnt{font-size:10px;color:rgba(201,168,76,.25)}
.ctx-dim.done .ctx-dim-cnt{color:rgba(39,174,96,.5)}

/* Progress ring */
.ctx-ring{text-align:center;margin-bottom:20px}
.ctx-ring-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(201,168,76,.35);margin-bottom:10px}
.ring-wrap{position:relative;width:64px;height:64px;margin:0 auto}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#C9A84C;line-height:1}
.ring-sub{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:rgba(201,168,76,.38);margin-top:1px}

.ctx-footer{font-size:10px;color:rgba(201,168,76,.18);letter-spacing:.04em;margin-top:auto;padding-top:16px}

/* ══ MAIN ══ */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* Topbar */
.topbar{
  display:flex;align-items:center;gap:16px;
  padding:16px 40px;background:#FDF8F0;
  border-bottom:.5px solid rgba(139,105,20,.1);
  position:sticky;top:0;z-index:10;flex-shrink:0;
}
.q-counter{font-size:12px;color:#B5A88C;letter-spacing:.04em;white-space:nowrap}
.progress-wrap{flex:1;height:3px;background:rgba(139,105,20,.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#6B4C8B,#8B6914,#C9A84C);transition:width .4s ease}
.save-lbl{font-size:11px;color:#B5A88C;white-space:nowrap;min-width:64px;text-align:right}

/* Main content */
.q-area{flex:1;padding:44px 40px 80px;max-width:640px;width:100%;margin:0 auto}

/* Round 2 header card */
.r2-header{
  background:#0C0902;border-radius:10px;padding:24px 28px;margin-bottom:32px;
  border:.5px solid rgba(201,168,76,.15);
}
.r2-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(201,168,76,.5);margin-bottom:10px;
}
.r2-header h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#FAF0DC;line-height:1.2;margin-bottom:6px}
.r2-header h2 em{font-style:italic;color:#C9A84C}
.r2-header p{font-size:13px;font-weight:300;color:rgba(232,213,163,.45);line-height:1.7}

/* Dimension intro */
.dim-intro{
  border-left:3px solid rgba(201,168,76,.35);
  padding:12px 16px;margin-bottom:24px;
  background:rgba(201,168,76,.04);border-radius:0 6px 6px 0;
}
.dim-intro-eyebrow{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#8B6914;font-weight:500;margin-bottom:4px}
.dim-intro h3{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:#2A1C06;margin-bottom:4px}
.dim-intro p{font-size:12.5px;font-weight:300;color:#7A6A4F;line-height:1.65}

/* Question card */
.q-card{
  background:#fff;border:.5px solid rgba(139,105,20,.14);border-radius:10px;
  padding:26px 28px;margin-bottom:16px;
  animation:fadeUp .3s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-num{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#B5A88C;margin-bottom:7px}
.q-text{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:500;color:#2A1C06;line-height:1.35;margin-bottom:6px}
.q-hint{font-size:12.5px;font-weight:300;color:#9A8A72;line-height:1.6;margin-bottom:18px}

/* ── ANSWER TYPES ── */

/* Scale */
.scale-wrap{display:flex;gap:6px}
.sc-opt{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:12px 4px;border-radius:4px;
  border:.5px solid rgba(139,105,20,.2);background:#fff;
  cursor:pointer;transition:all .18s;user-select:none;
}
.sc-opt:hover{border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.05)}
.sc-opt.on{background:#2A1C06;border-color:#2A1C06}
.sc-num{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:#2A1C06;line-height:1;margin-bottom:4px}
.sc-opt.on .sc-num{color:#E8D5A3}
.sc-lbl{font-size:10px;text-align:center;color:#B5A88C;line-height:1.3}
.sc-opt.on .sc-lbl{color:rgba(232,213,163,.7)}
.scale-ends{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:#B5A88C;letter-spacing:.04em}

/* Single select */
.chip-grid{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  padding:9px 16px;border-radius:20px;font-size:13px;font-weight:400;
  border:.5px solid rgba(139,105,20,.22);background:#fff;color:#5A4A2E;
  cursor:pointer;transition:all .18s;user-select:none;
}
.chip:hover{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.06)}
.chip.on{background:#2A1C06;color:#E8D5A3;border-color:#2A1C06;font-weight:500}

/* Multi select */
.mchip{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 14px;border-radius:20px;font-size:13px;font-weight:400;
  border:.5px solid rgba(139,105,20,.22);background:#fff;color:#5A4A2E;
  cursor:pointer;transition:all .18s;user-select:none;
}
.mchip:hover{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.06)}
.mchip.on{background:#2A1C06;color:#E8D5A3;border-color:#2A1C06;font-weight:500}
.mchip-chk{width:14px;height:14px;border-radius:2px;border:.5px solid currentColor;opacity:.45;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.mchip.on .mchip-chk{opacity:1;background:rgba(255,255,255,.15)}

/* Text / long form */
.q-textarea{
  width:100%;padding:13px 15px;min-height:110px;resize:vertical;
  border:.5px solid rgba(139,105,20,.24);border-radius:4px;
  background:#fff;font-family:'Jost',sans-serif;font-size:14px;font-weight:300;color:#2A1C06;
  outline:none;transition:border-color .2s;line-height:1.65;
}
.q-textarea:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.q-textarea::placeholder{color:#C0B09A}
.char-count{text-align:right;font-size:11px;color:#B5A88C;margin-top:4px}

/* Yes/No/Open */
.yno-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.yno-btn{
  padding:14px;text-align:center;border-radius:6px;
  border:.5px solid rgba(139,105,20,.2);background:#fff;
  cursor:pointer;transition:all .18s;user-select:none;
}
.yno-btn:hover{border-color:rgba(201,168,76,.45);background:rgba(201,168,76,.05)}
.yno-btn.on{background:#2A1C06;border-color:#2A1C06}
.yno-ico{font-size:20px;margin-bottom:5px}
.yno-lbl{font-size:13px;color:#5A4A2E;font-weight:400}
.yno-btn.on .yno-lbl{color:#E8D5A3;font-weight:500}

/* Slider */
.slider-wrap{padding:6px 0}
.slider-track input[type=range]{
  width:100%;height:4px;border-radius:2px;
  -webkit-appearance:none;appearance:none;outline:none;cursor:pointer;
  background:linear-gradient(to right,#C9A84C var(--pct,50%),rgba(139,105,20,.15) var(--pct,50%));
  margin:10px 0;
}
.slider-track input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:#2A1C06;border:2px solid #C9A84C;cursor:pointer;
}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:#B5A88C}
.slider-val{display:inline-block;padding:4px 14px;background:rgba(201,168,76,.1);border:.5px solid rgba(201,168,76,.28);border-radius:12px;font-size:13px;font-weight:500;color:#8B6914;margin-top:6px}

/* ── NAVIGATION ── */
.q-nav{display:flex;gap:10px;margin-top:8px;align-items:center}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:3px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;letter-spacing:.03em;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:#2A1C06;color:#E8D5A3;flex:1}
.btn-primary:hover{background:#1A1005}
.btn-gold{background:#C9A84C;color:#0C0902;flex:1}
.btn-gold:hover{background:#E8D5A3}
.btn-outline{background:transparent;color:#2A1C06;border:.5px solid rgba(42,28,6,.26);flex:0 0 auto;padding:12px 16px}
.btn-outline:hover{background:rgba(42,28,6,.04)}
.btn:disabled{opacity:.4;pointer-events:none}
.skip-btn{font-size:12px;color:#B5A88C;background:none;border:none;cursor:pointer;padding:0;margin-left:auto;transition:color .2s}
.skip-btn:hover{color:#7A6A4F}
.btn-spinner{display:none;width:15px;height:15px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite}
.btn.loading .btn-spinner{display:block}
.btn.loading .btn-text{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

/* Sensitivity notice */
.sensitivity-note{
  display:flex;gap:10px;padding:12px 14px;
  background:rgba(201,168,76,.05);border:.5px solid rgba(201,168,76,.18);
  border-radius:6px;margin-bottom:14px;font-size:12px;color:#7A6A4F;line-height:1.6;
}
.sensitivity-note span{color:#8B6914;flex-shrink:0;margin-top:1px}

/* Toast & divider */
.sec-div{border:none;border-top:.5px solid rgba(139,105,20,.1);margin:20px 0}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#2A1C06;color:#E8D5A3;padding:10px 20px;border-radius:3px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;border:.5px solid rgba(201,168,76,.22)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Mobile */
/* Mobile header */
.mobile-hdr{display:none;align-items:center;gap:10px;padding:14px 18px;background:#0C0902}
.mobile-hdr img{height:28px;width:auto}
.mobile-hdr span{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:#FAF0DC}

@media(max-width:820px){
  .ctx{display:none}
  .mobile-hdr{display:flex}
  .q-area{padding:24px 16px 80px}
  .topbar{padding:14px 16px}
  .scale-wrap{flex-wrap:wrap}
  .sc-opt{flex:1 1 calc(33% - 6px);min-width:56px;min-height:44px}
  .yno-row{grid-template-columns:1fr}
  .yno-opt,.btn,.nav-btn{min-height:44px}
  .topbar h1{font-size:20px}
}
</style>
</head>
<body>
<div class="mobile-hdr" aria-label="Round 2 questionnaire">
  <img src="/assets/logo.png" alt="Hassabe logo" width="28" height="28">
  <span>Hassabe - ሃሳቤ</span>
</div>
<div class="shell" role="main">

<!-- ══ LEFT CONTEXT PANEL ══ -->
<aside class="ctx">
  <a class="ctx-logo" href="#"><img src="/assets/logo.png" alt="Hassabe logo" width="36" height="36" style="vertical-align:middle"></a>
  <div class="ctx-sub">Round 2 · Deep Compatibility</div>

  <!-- Match context -->
  <div class="ctx-match">
    <div class="ctx-match-label">You are matched with</div>
    <div class="ctx-match-row">
      <div class="ctx-av" id="ctx-avatar">SR</div>
      <div>
        <div class="ctx-name" id="ctx-name">Sara R.</div>
        <div class="ctx-match-sub" id="ctx-sub">30 · Physician · Toronto</div>
      </div>
    </div>
    <div class="ctx-score-row">
      <div>
        <div class="ctx-score-num" id="ctx-score">87%</div>
        <div class="ctx-score-lbl">Round 1 score</div>
      </div>
      <div class="ctx-score-bar">
        <div class="ctx-score-fill" id="ctx-score-fill" style="width:87%"></div>
      </div>
    </div>
  </div>

  <!-- Deadline timer -->
  <div class="ctx-timer" id="ctx-timer">
    <div class="ctx-timer-label">Round 2 deadline</div>
    <div class="ctx-timer-row">
      <div class="ctx-timer-num" id="timer-hrs">68</div>
      <div class="ctx-timer-unit">hours</div>
      <div style="margin-left:8px">
        <div class="ctx-timer-num" id="timer-mins" style="font-size:20px">42</div>
        <div class="ctx-timer-unit">min</div>
      </div>

    <div class="ctx-timer-bar">
      <div class="ctx-timer-fill" id="timer-bar" style="width:95%"></div>

  <!-- Progress ring -->
  <div class="ctx-ring">
    <div class="ctx-ring-label">Progress</div>
    <div class="ring-wrap">
      <svg viewBox="0 0 64 64" width="64" height="64">
        <circle cx="32" cy="32" r="24" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="4"/>
        <circle id="ring-arc" cx="32" cy="32" r="24" fill="none" stroke="#C9A84C" stroke-width="4"
          stroke-dasharray="0 150.8" stroke-linecap="round" style="transition:stroke-dasharray .5s ease"/>

      <div class="ring-inner">

  <!-- Dimension nav -->

<!-- ══ MAIN ══ -->
<div class="main">

    <span class="save-lbl" id="save-lbl">Not saved</span>
  </div>

  <div class="q-area" id="q-area">
    <!-- Question injected here -->
  </div>
</div>
</div>
<div id="toast"></div>

<script>
'use strict';
const API = window.HASSABE_CONFIG.API;

/* ════════════════════════════════════════════════════════
   MATCH CONTEXT (passed via URL params in production)
   ════════════════════════════════════════════════════════ */
const MATCH = {
  id:            'match-001',
  r1Score:       87,
  partnerName:   'Sara R.',
  partnerInitials:'SR',
  partnerSub:    '30 · Physician · Toronto',
  expiresAt:     new Date(Date.now() + 68.7 * 3600000).toISOString(),
};

/* ════════════════════════════════════════════════════════
   DIMENSIONS — 5 Round 2 categories
   ════════════════════════════════════════════════════════ */
const DIMS = [
  { id:'marriage',   label:'Marriage & Timing',     qs:[0,1,2,3,4]    },
  { id:'finances',   label:'Finances & Security',   qs:[5,6,7]        },
  { id:'family',     label:'Family & Roles',        qs:[8,9,10,11,12] },
  { id:'conflict',   label:'Conflict & Emotions',   qs:[13,14,15,16]  },
  { id:'readiness',  label:'Readiness & Life Now',  qs:[17,18,19,20,21,22,23,24] },
];

const DIM_INTRO = {
  marriage:  { title:'Marriage &', sub:'Timing',          desc:'Your timeline, expectations, and vision for how a marriage begins. These answers carry 25% of the Round 2 score.' },
  finances:  { title:'Finances &', sub:'Security',        desc:'Financial misalignment is one of the most common sources of long-term friction. There are no wrong answers — only honest ones.' },
  family:    { title:'Family &',   sub:'Roles',           desc:'How you envision family structure, involvement of extended family, parenting, and the division of household life.' },
  conflict:  { title:'Conflict &', sub:'Emotional Life',  desc:'How you handle tension, express vulnerability, and stay emotionally available. Compatibility here predicts long-term relationship health.' },
  readiness: { title:'Readiness &',sub:'Life Right Now',  desc:'Your actual situation today — openness, timing, and anything a potential partner should understand before deciding to proceed.' },
};

/* ════════════════════════════════════════════════════════
   QUESTIONS — all 25 Round 2 questions
   ════════════════════════════════════════════════════════ */
const QUESTIONS = [

  /* ── DIMENSION 1: MARRIAGE & TIMING (Q1–Q5) ── */
  {
    dim:'marriage', n:1,
    text:'How soon are you hoping to get married if you find the right person?',

/* ════════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════════ */
let curQ       = 0;
const answers  = {};
const TOTAL    = QUESTIONS.length;
let saveTimer  = null;
let lastDimIdx = -1;
let dragSrc    = null;

/* ════════════════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════════════════ */
(function init() {
  // Populate context panel
  document.getElementById('ctx-avatar').textContent  = MATCH.partnerInitials;
  document.getElementById('ctx-name').textContent    = MATCH.partnerName;
  document.getElementById('ctx-sub').textContent     = MATCH.partnerSub;
  document.getElementById('ctx-score').textContent   = MATCH.r1Score + '%';
  document.getElementById('ctx-score-fill').style.width = MATCH.r1Score + '%';

  buildDimNav();
  startTimer();
  restoreDraft();
  renderQuestion(curQ);
  updateProgress();
})();

/* ─── Dimension nav ─── */
function buildDimNav() {
  document.getElementById('ctx-dims').innerHTML = DIMS.map((d, i) => `
    <div class="ctx-dim" id="cdim-${d.id}" onclick="jumpToDim(${i})">
      <div class="ctx-dim-dot"></div>
      <div class="ctx-dim-lbl">${d.label}</div>
      <div class="ctx-dim-cnt" id="cdim-cnt-${d.id}">0/${d.qs.length}</div>
    </div>`).join('');
}

function updateDimNav() {
  DIMS.forEach(d => {
    const ans   = d.qs.filter(qi => answers[qi] !== undefined && answers[qi] !== null).length;
    const el    = document.getElementById(`cdim-${d.id}`);
    const cnt   = document.getElementById(`cdim-cnt-${d.id}`);
    const curDim = getDim(curQ).id;
    if (!el) return;
    el.classList.remove('active','done','partial');
    if (d.id === curDim) el.classList.add('active');
    else if (ans === d.qs.length) el.classList.add('done');
    else if (ans > 0) el.classList.add('partial');
    if (cnt) cnt.textContent = `${ans}/${d.qs.length}`;
  });
}

function getDim(qi) { return DIMS.find(d => d.qs.includes(qi)) || DIMS[0]; }
function getDimIdx(qi) { return DIMS.findIndex(d => d.qs.includes(qi)); }
function jumpToDim(i) { curQ = DIMS[i].qs[0]; renderQuestion(curQ); updateProgress(); }

/* ─── Timer ─── */
function startTimer() {
  const expires = new Date(MATCH.expiresAt).getTime();
  const totalMs  = 72 * 3600000;

  function tick() {
    const left = Math.max(0, expires - Date.now());
    const hrs  = Math.floor(left / 3600000);
    const mins = Math.floor((left % 3600000) / 60000);
    const pct  = Math.min(100, (left / totalMs) * 100);

    document.getElementById('timer-hrs').textContent  = hrs;
    document.getElementById('timer-mins').textContent = String(mins).padStart(2,'0');
    document.getElementById('timer-bar').style.width  = pct + '%';

    const timerEl = document.getElementById('ctx-timer');
    timerEl.classList.remove('ctx-timer-warn','ctx-timer-urgent');
    if (hrs < 12) timerEl.classList.add('ctx-timer-urgent');
    else if (hrs < 24) timerEl.classList.add('ctx-timer-warn');
  }

  tick();
  setInterval(tick, 60000);
}

/* ─── Progress ─── */
function updateProgress() {
  const ans = Object.keys(answers).filter(k => answers[k] !== null && answers[k] !== undefined).length;
  const pct = Math.round((ans / TOTAL) * 100);
  const circumf = 2 * Math.PI * 24;

  document.getElementById('pbar').style.width      = ((curQ + 1) / TOTAL * 100) + '%';
  document.getElementById('q-counter').textContent = `Q ${curQ + 1} / ${TOTAL}`;
  document.getElementById('ring-pct').textContent  = pct + '%';
  document.getElementById('ring-arc').setAttribute('stroke-dasharray', `${(pct/100*circumf).toFixed(1)} ${circumf.toFixed(1)}`);
  updateDimNav();
}

/* ════════════════════════════════════════════════════════
   RENDER QUESTION
   ════════════════════════════════════════════════════════ */
function renderQuestion(qi) {
  const q      = QUESTIONS[qi];
  const dim    = getDim(qi);
  const dimIdx = getDimIdx(qi);
  const area   = document.getElementById('q-area');

  let html = '';

  // Round 2 intro (once)
  if (qi === 0) {
    html += `
    <div class="r2-header">
      <div class="r2-badge">◆ Round 2 of 2 &nbsp;·&nbsp; Deep Compatibility</div>
      <h2>Going <em>deeper</em></h2>
      <p>These 25 questions go beyond the foundation. Marriage expectations, finances, family roles, conflict, and your actual readiness right now. Both you and ${MATCH.partnerName.split(' ')[0]} must complete this independently before your combined score is calculated.</p>
    </div>`;
  }

  // Dimension intro when entering a new dimension
  const showDimIntro = dimIdx !== lastDimIdx;
  lastDimIdx = dimIdx;

  if (showDimIntro) {
    const di = DIM_INTRO[dim.id];
    html += `
    <div class="dim-intro">
      <div class="dim-intro-eyebrow">Dimension ${dimIdx + 1} of ${DIMS.length} · ${dim.qs.length} questions</div>
      <h3>${di.title} <em style="font-style:italic;color:#C9A84C">${di.sub}</em></h3>
      <p>${di.desc}</p>
    </div>`;
  }

  // Sensitivity notice for private questions
  if (q.sensitive) {
    html += `
    <div class="sensitivity-note">
      <span>🔒</span>
      Your response is private. It is never shown to your match, and only used by the AI to assess compatibility.
    </div>`;
  }

  html += `
  <div class="q-card">
    <div class="q-num" style="color:${dimColor(dim.id)}">Q${qi+1} · ${dim.label}</div>
    <div class="q-text">${q.text}</div>
    ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
    <div id="ans-area">${renderAnswer(q, qi)}</div>
  </div>
  <div class="q-nav">
    ${qi > 0 ? `<button class="btn btn-outline" onclick="prevQ()">←</button>` : ''}
    <button class="btn btn-primary" id="next-btn" onclick="nextQ()">
      <span class="btn-text">${qi < TOTAL - 1 ? 'Next →' : 'Submit Round 2 ✓'}</span>
      <div class="btn-spinner"></div>
    </button>
    ${q.optional ? `<button class="skip-btn" onclick="skipQ(${qi})">Skip</button>` : ''}
  </div>`;

  area.innerHTML = html;
  restoreAnswer(q, qi, answers[qi]);
  document.getElementById('main') ? document.getElementById('main').scrollTop = 0 : document.querySelector('.main').scrollTop = 0;
  updateProgress();
}

function dimColor(id) {
  return {marriage:'#8B6914',finances:'#1A5096',family:'#2D6A4F',conflict:'#6B4C8B',readiness:'#B5481A'}[id] || '#8B6914';
}

/* ── Render answer type ── */
function renderAnswer(q, qi) {
  if (q.type === 'scale5') {
    return `<div class="scale-wrap">
      ${[1,2,3,4,5].map(n => `
        <div class="sc-opt" data-val="${n}" onclick="pickScale(${qi},${n},this)">
          <div class="sc-num">${n}</div>
          <div class="sc-lbl">${q.labels[n-1]}</div>
        </div>`).join('')}
    </div>
    <div class="scale-ends"><span>${q.labels[0]}</span><span>${q.labels[4]}</span></div>`;
  }
  if (q.type === 'single') {
    return `<div class="chip-grid">
      ${q.options.map((opt,i) => `<div class="chip" data-val="${i}" onclick="pickSingle(${qi},${i},this)">${opt}</div>`).join('')}
    </div>`;
  }
  if (q.type === 'multi') {
    const note = q.max ? `<div style="font-size:11px;color:#B5A88C;margin-bottom:9px">Select up to ${q.max}</div>` : '';
    return `${note}<div class="chip-grid">
      ${q.options.map((opt,i) => `
        <div class="mchip" data-val="${i}" onclick="toggleMulti(${qi},${i},this,${q.max||99})">
          <div class="mchip-chk">✓</div>${opt}
        </div>`).join('')}
    </div>`;
  }
  if (q.type === 'text') {
    return `<textarea class="q-textarea" id="ta-${qi}" maxlength="600"
      placeholder="${q.placeholder}" oninput="saveText(${qi},this.value)"></textarea>
    <div class="char-count"><span id="cc-${qi}">0</span> / 600</div>`;
  }
  if (q.type === 'yno') {
    return `<div class="yno-row">
      ${q.options.map((opt,i) => `
        <div class="yno-btn" data-val="${i}" onclick="pickYNO(${qi},${i},this)">
          <div class="yno-ico">${['✓','✗','?'][i]||'●'}</div>
          <div class="yno-lbl">${opt}</div>
        </div>`).join('')}
    </div>`;
  }
  return '';
}

function restoreAnswer(q, qi, val) {
  if (val === undefined || val === null) return;
  if (q.type === 'scale5') {
    document.querySelectorAll('.sc-opt').forEach(el => el.classList.toggle('on', +el.dataset.val === val));
  }
  if (q.type === 'single') {
    document.querySelectorAll('.chip').forEach(el => el.classList.toggle('on', +el.dataset.val === val));
  }
  if (q.type === 'multi' && Array.isArray(val)) {
    document.querySelectorAll('.mchip').forEach(el => el.classList.toggle('on', val.includes(+el.dataset.val)));
  }
  if (q.type === 'text') {
    const ta = document.getElementById(`ta-${qi}`);
    if (ta) { ta.value = val; updateCC(qi, val); }
  }
}

/* ── Answer handlers ── */
function pickScale(qi, val, el) {
  document.querySelectorAll('.sc-opt').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  answers[qi] = val;
  scheduleSave();
}
function pickSingle(qi, val, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  answers[qi] = val;
  scheduleSave();
}
function toggleMulti(qi, val, el, max) {
  const cur = Array.isArray(answers[qi]) ? [...answers[qi]] : [];
  if (el.classList.contains('on')) {
    el.classList.remove('on');
    answers[qi] = cur.filter(v => v !== val);
  } else {
    if (cur.length >= max) { toast(`Select up to ${max} options`); return; }
    el.classList.add('on');
    answers[qi] = [...cur, val];
  }
  scheduleSave();
}
function pickYNO(qi, val, el) {
  document.querySelectorAll('.yno-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  answers[qi] = val;
  scheduleSave();
}
function saveText(qi, val) {
  answers[qi] = val;
  updateCC(qi, val);
  scheduleSave();
}
function updateCC(qi, val) {
  const el = document.getElementById(`cc-${qi}`);
  if (el) el.textContent = (val || '').length;
}
function skipQ(qi) { answers[qi] = null; nextQ(); }

/* ── Navigation ── */
function nextQ() {
  const q = QUESTIONS[curQ];
  if (!q.optional && answers[curQ] === undefined) {
    toast('Please answer this question to continue');
    shakeCard();
    return;
  }
  if (curQ < TOTAL - 1) {
    curQ++;
    renderQuestion(curQ);
    updateProgress();
  } else {
    submitR2();
  }
}
function prevQ() {
  if (curQ > 0) { curQ--; renderQuestion(curQ); updateProgress(); }
}
function shakeCard() {
  const c = document.querySelector('.q-card');
  if (!c) return;
  c.style.animation = 'none';
  c.style.transform = 'translateX(6px)';
  setTimeout(() => c.style.transform = 'translateX(-6px)', 80);
  setTimeout(() => c.style.transform = 'translateX(4px)', 160);
  setTimeout(() => c.style.transform = 'translateX(0)', 240);
}

/* ── Auto-save ── */
function scheduleSave() {
  clearTimeout(saveTimer);
  document.getElementById('save-lbl').textContent = 'Saving…';
  saveTimer = setTimeout(() => {
    try { localStorage.setItem('hassabe_r2_draft', JSON.stringify({ curQ, answers, matchId: MATCH.id })); } catch {}
    document.getElementById('save-lbl').textContent = 'Saved ✓';
  }, 800);
}
function restoreDraft() {
  try {
    const d = localStorage.getItem('hassabe_r2_draft');
    if (!d) return;
    const { curQ: cq, answers: ans, matchId } = JSON.parse(d);
    if (matchId !== MATCH.id) return;
    Object.assign(answers, ans);
    if (cq > 0 && cq < TOTAL) {
      curQ = cq;
      lastDimIdx = getDimIdx(cq) - 1;
    }
    const count = Object.values(answers).filter(v => v !== null && v !== undefined).length;
    if (count > 0) toast(`Restored ${count} saved answers`);
  } catch {}
}

/* ── Submit ── */
async function submitR2() {
  // Check required questions
  const missing = QUESTIONS
    .map((q, i) => !q.optional && answers[i] === undefined ? i : null)
    .filter(i => i !== null);

  if (missing.length) {
    curQ = missing[0];
    renderQuestion(curQ);
    updateProgress();
    toast(`Please answer Q${missing[0]+1} before submitting`);
    return;
  }

  const btn = document.getElementById('next-btn');
  btn.classList.add('loading'); btn.disabled = true;

  const payload = {
    round: 2,
    matchId: MATCH.id,
    responses: QUESTIONS.map((q, i) => ({
      question_id:  `q2_${String(i+1).padStart(2,'0')}`,
      dimension:     q.dim,
      type:          q.type,
      question:      q.text,
      answer:        answers[i] ?? null,
      answer_text:   formatAnswerText(q, i),
      skipped:       answers[i] === null,
      sensitive:     q.sensitive || false,
    })),
    metadata: {
      started_at:   localStorage.getItem('hassabe_r2_start') || new Date().toISOString(),
      completed_at: new Date().toISOString(),
    },
  };

       const res = await fetch(`${API}/api/questionnaire/round2/${MATCH.id}`, {
       method: 'POST',
       headers: window.Auth.headers(),
       body: JSON.stringify(payload)
     });
     if (!res.ok) {
       const err = await res.json();
       toast(err.error || 'Submission failed. Please try again.');
       btn.classList.remove('loading'); btn.disabled = false;
       return;
     }
     const data = await res.json();
     localStorage.removeItem('hassabe_r2_draft');
     window.location.href = `/match-result?matchId=${MATCH.id}&bothComplete=${data.bothComplete}`;

  await sleep(1800);
  localStorage.removeItem('hassabe_r2_draft');
  // Redirect to result page
  document.body.innerHTML = buildResultWaiting();
}

function buildResultWaiting() {
  return `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FDF8F0;font-family:'Jost',sans-serif">
    <div style="max-width:440px;text-align:center;padding:40px 24px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:400;color:#0C0902;margin-bottom:4px"<img src="/assets/logo.png" alt="Hassabe logo" width="36" height="36" style="vertical-align:middle">/div>
      <div style="font-size:48px;margin:24px 0">✦</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:#2A1C06;margin-bottom:12px">Round 2 submitted</div>
      <p style="font-size:14px;font-weight:300;color:#7A6A4F;line-height:1.75;margin-bottom:28px">
        Your responses are being processed. Once ${MATCH.partnerName.split(' ')[0]} also submits, the AI will calculate your combined score and send you both the result.
      </p>
      <div style="background:#0C0902;border-radius:8px;padding:20px;margin-bottom:24px;border:.5px solid rgba(201,168,76,.15)">
        <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(201,168,76,.4);margin-bottom:10px">What happens next</div>
        <div style="font-size:13px;color:rgba(232,213,163,.6);line-height:1.8;text-align:left">
          <div style="padding:5px 0;border-bottom:.5px solid rgba(201,168,76,.08)">1. AI combines your R1 and R2 scores (R1×40% + R2×60%)</div>
          <div style="padding:5px 0;border-bottom:.5px solid rgba(201,168,76,.08)">2. If combined score ≥ 68% → match is approved</div>
          <div style="padding:5px 0">3. You will both be notified of the result immediately</div>
        </div>
      </div>
      <button onclick="window.location.href='/dashboard'" style="width:100%;padding:13px;background:#C9A84C;color:#0C0902;border:none;border-radius:3px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer">Back to Dashboard →</button>
    </div>
  </div>`;
}

/* ── Helpers ── */
function formatAnswerText(q, qi) {
  const ans = answers[qi];
  if (ans === null || ans === undefined) return null;
  if (q.type === 'scale5') return `${ans} — ${q.labels[ans-1]}`;
  if (q.type === 'single') return q.options[ans] || String(ans);
  if (q.type === 'multi'  && Array.isArray(ans)) return ans.map(i => q.options[i]).join(', ');
  if (q.type === 'text')  return ans;
  return String(ans);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let toastT;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}

if (!localStorage.getItem('hassabe_r2_start')) {
  localStorage.setItem('hassabe_r2_start', new Date().toISOString());
}
