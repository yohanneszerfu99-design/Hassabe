<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassabe — Your Matches</title>
<script src="/js/config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Jost',sans-serif;background:#FDF8F0;-webkit-font-smoothing:antialiased;color:#2A1C06}
.page{max-width:820px;margin:0 auto;padding:36px 22px 80px}
.topnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;color:#2A1C06;text-decoration:none}
.logo span{color:#C9A84C}
.nav-links{display:flex;gap:6px}
.nav-link{padding:7px 13px;border-radius:3px;font-size:12.5px;color:#7A6A4F;text-decoration:none;transition:all .18s}
.nav-link:hover{background:rgba(139,105,20,.07)}
.nav-link.active{background:#2A1C06;color:#E8D5A3}
.page-h{margin-bottom:24px}
.page-h h1{font-family:'Cormorant Garamond',serif;font-size:34px;color:#2A1C06;margin-bottom:4px}
.page-h p{font-size:13px;color:#7A6A4F}
.tabs{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:6px 15px;border-radius:20px;font-size:12.5px;border:.5px solid rgba(139,105,20,.2);background:#fff;color:#5A4A2E;cursor:pointer;transition:all .18s}
.tab.on{background:#2A1C06;color:#E8D5A3;border-color:#2A1C06;font-weight:500}
.tab-n{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:rgba(201,168,76,.2);color:#8B6914;font-size:10px;font-weight:700;margin-left:4px}
.tab.on .tab-n{background:rgba(255,255,255,.15);color:#E8D5A3}
.grid{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border:.5px solid rgba(139,105,20,.13);border-radius:10px;padding:20px 22px;transition:border-color .2s;animation:fu .3s ease}
.card:hover{border-color:rgba(201,168,76,.32)}
@keyframes fu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ch{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.av{width:52px;height:52px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,rgba(201,168,76,.24),rgba(201,168,76,.05));border:1.5px solid rgba(201,168,76,.32);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:#C9A84C}
.ci{flex:1}
.cn{font-family:'Cormorant Garamond',serif;font-size:19px;color:#2A1C06;margin-bottom:1px}
.cs{font-size:12px;color:#9A8A72}
.cscore{text-align:center;flex-shrink:0}
.cscore-n{font-family:'Cormorant Garamond',serif;font-size:32px;color:#C9A84C;line-height:1}
.cscore-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(201,168,76,.45)}
.bar{height:3px;background:rgba(139,105,20,.1);border-radius:2px;overflow:hidden;margin-bottom:10px}
.bar-f{height:100%;background:linear-gradient(90deg,#8B6914,#C9A84C);border-radius:2px}
.dims{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.dim{font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(201,168,76,.08);color:#8B6914;border:.5px solid rgba(201,168,76,.18)}
.summary{font-size:13px;color:#5A4A2E;line-height:1.7;font-style:italic;padding:10px 13px;background:rgba(201,168,76,.05);border-left:2px solid rgba(201,168,76,.28);border-radius:0 4px 4px 0;margin-bottom:12px}
.exp-bar{height:3px;background:rgba(139,105,20,.08);border-radius:2px;overflow:hidden;margin-bottom:8px}
.exp-f{height:100%;border-radius:2px;background:#C9A84C}
.timer{font-size:11px;color:#B5481A;margin-bottom:10px}
.cf{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.st{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.st-notified{background:rgba(74,122,200,.1);color:#1A5096}
.st-pending_r2,.st-scoring_r2{background:rgba(245,166,35,.1);color:#8B6914}
.st-approved,.st-messaging_unlocked{background:rgba(39,174,96,.1);color:#1A7A4F}
.st-declined,.st-expired{background:rgba(139,139,139,.08);color:#999}
.btn{display:inline-flex;align-items:center;padding:9px 18px;border-radius:3px;font-family:'Jost',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;text-decoration:none;transition:all .2s}
.btn-d{background:#2A1C06;color:#E8D5A3}
.btn-d:hover{background:#1A1005}
.btn-g{background:#C9A84C;color:#0C0902}
.btn-g:hover{background:#E8D5A3}
.btn-o{background:transparent;color:#2A1C06;border:.5px solid rgba(42,28,6,.24)}
.loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px;color:#9A8A72;font-size:13px}
.spin{width:26px;height:26px;border:2px solid rgba(201,168,76,.2);border-top-color:#C9A84C;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:56px 24px}
.empty-ico{font-size:38px;margin-bottom:12px;opacity:.28}
.empty-h{font-family:'Cormorant Garamond',serif;font-size:22px;color:#2A1C06;margin-bottom:6px}
.empty-p{font-size:13px;color:#9A8A72;line-height:1.7;max-width:300px;margin:0 auto}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:#2A1C06;color:#E8D5A3;padding:8px 16px;border-radius:3px;font-size:12.5px;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;border:.5px solid rgba(201,168,76,.2)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){.ch{flex-wrap:wrap}.cf{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="page">
  <nav class="topnav">
    <a href="/landing.html" style="display:inline-flex;align-items:center;text-decoration:none"><img src="/assets/logo.png" alt="Hassabe" style="height:36px;width:auto;vertical-align:middle"></a>
    <div class="nav-links">
      <a class="nav-link active" href="/matches.html">Matches</a>
      <a class="nav-link" href="/notifications.html">Alerts</a>
      <a class="nav-link" href="/chat.html">Chat</a>
      <a class="nav-link" href="#" onclick="window.Auth.clear();location.href='/auth.html'">Sign out</a>
    </div>
  </nav>

  <div class="page-h">
    <h1>Your Matches</h1>
    <p id="page-sub">Loading…</p>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab on" data-status="" onclick="switchTab(this)">All</div>
    <div class="tab" data-status="notified" onclick="switchTab(this)">New</div>
    <div class="tab" data-status="pending_r2" onclick="switchTab(this)">Round 2</div>
    <div class="tab" data-status="approved" onclick="switchTab(this)">Approved</div>
    <div class="tab" data-status="messaging_unlocked" onclick="switchTab(this)">Chatting</div>
    <div class="tab" data-status="declined" onclick="switchTab(this)">Declined</div>
  </div>

  <div class="grid" id="grid"><div class="loading"><div class="spin"></div>Loading your matches…</div></div>
</div>
<div id="toast"></div>

<script>
'use strict';
if (!window.Auth.getToken()) { window.location.href = '/auth.html'; }

let allMatches = [], activeStatus = '';

(async function() {
  const res  = await window.api('/api/matches');
  if (!res) return;
  const data = await res.json();
  allMatches = data.matches || [];

  document.getElementById('page-sub').textContent =
    allMatches.length ? `${allMatches.length} match${allMatches.length !== 1?'es':''} found`
    : 'No matches yet — the engine runs nightly';

  const counts = {};
  allMatches.forEach(m => counts[m.status] = (counts[m.status]||0)+1);
  document.querySelectorAll('.tab[data-status]').forEach(tab => {
    const st = tab.dataset.status;
    const n  = st ? (counts[st]||0) : allMatches.length;
    const old = tab.querySelector('.tab-n');
    if (old) old.remove();
    if (n) tab.insertAdjacentHTML('beforeend',`<span class="tab-n">${n}</span>`);
  });

  render();
})().catch(e => {
  document.getElementById('grid').innerHTML = `<div class="empty"><div class="empty-p" style="color:#B5341A">Error: ${e.message}</div></div>`;
});

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  activeStatus = el.dataset.status;
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const list = activeStatus ? allMatches.filter(m => m.status === activeStatus) : allMatches;
  if (!list.length) {
    const empties = {
      '':'No matches yet — complete Round 1 to enter the matching pool',
      notified:'No new matches', pending_r2:'No Round 2 matches',
      approved:'No approved matches yet', messaging_unlocked:'No open conversations',
      declined:'No declined matches',
    };
    grid.innerHTML = `<div class="empty"><div class="empty-ico">✦</div><h2 class="empty-h">Nothing here yet</h2><p class="empty-p">${empties[activeStatus]||''}</p></div>`;
    return;
  }
  grid.innerHTML = list.map(card).join('');
}

function card(m) {
  const p = m.partner || {};
  const initials = (p.first_name||'?')[0].toUpperCase();
  const age = p.date_of_birth ? Math.floor((Date.now()-new Date(p.date_of_birth))/31557600000) : null;
  const sub = [age, p.profession, p.city].filter(Boolean).join(' · ');
  const r1  = Math.round(m.r1_score || 0);
  const fin = m.combined_score ? Math.round(m.combined_score) : null;
  const sc  = fin ?? r1;
  const lbl = fin ? 'combined' : 'round 1';

  const dims = Object.entries(m.score_breakdown||{}).slice(0,4).map(([k,v]) =>
    `<span class="dim">${k.replace(/_/g,' ')} ${v}%</span>`).join('');

  let timerHtml = '';
  if (m.status === 'pending_r2' && m.r2_expires_at) {
    const h = Math.max(0, Math.round((new Date(m.r2_expires_at)-Date.now())/3600000));
    timerHtml = `<div class="exp-bar"><div class="exp-f" style="width:${Math.min(100,h/72*100)}%"></div></div>
                 <div class="timer">⏱ ${h}h remaining for Round 2</div>`;
  }
  if (m.status === 'messaging_unlocked' && m.expires_at) {
    const d = Math.max(0,Math.ceil((new Date(m.expires_at)-Date.now())/86400000));
    timerHtml = `<div class="exp-bar"><div class="exp-f" style="width:${Math.min(100,d/30*100)}%"></div></div>`;
  }

  const ctas = {
    notified:           `<a href="/questionnaire-r2.html?matchId=${m.id}" class="btn btn-d">Start Round 2 →</a>`,
    pending_r2:         `<a href="/questionnaire-r2.html?matchId=${m.id}" class="btn btn-d">Complete Round 2 →</a>`,
    scoring_r2:         `<span style="font-size:13px;color:#9A8A72">Calculating final score…</span>`,
    approved:           `<a href="/payment.html?matchId=${m.id}" class="btn btn-g">Unlock conversation — $49.99 →</a>`,
    messaging_unlocked: `<a href="/chat.html?matchId=${m.id}" class="btn btn-g">Open conversation →</a>`,
    declined:           `<a href="/match-result.html?matchId=${m.id}&result=declined" class="btn btn-o">View result</a>`,
    expired:            `<span style="font-size:13px;color:#B5A88C">Conversation closed</span>`,
  };
  const labels = {
    notified:'New match',pending_r2:'Round 2 open',scoring_r2:'Scoring…',
    approved:'Approved — unlock to chat',messaging_unlocked:'Conversation open',
    declined:'Not advanced',expired:'Expired',
  };

  return `<div class="card">
    <div class="ch">
      <div class="av">${initials}</div>
      <div class="ci"><div class="cn">${p.first_name||'Your Match'}</div><div class="cs">${sub||'—'}</div></div>
      <div class="cscore"><div class="cscore-n">${sc}%</div><div class="cscore-l">${lbl}</div></div>
    </div>
    <div class="bar"><div class="bar-f" style="width:${sc}%"></div></div>
    ${dims ? `<div class="dims">${dims}</div>` : ''}
    ${m.compatibility_summary ? `<div class="summary">${m.compatibility_summary}</div>` : ''}
    ${timerHtml}
    <div class="cf">
      <span class="st st-${m.status}">${labels[m.status]||m.status}</span>
      ${ctas[m.status]||''}
    </div>
  </div>`;
}

let tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
</html>
