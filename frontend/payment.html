<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassabe — Unlock Conversation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<!-- Stripe.js — for card element if using embedded checkout -->
<script src="https://js.stripe.com/v3/"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased;background:#0C0902;color:#2A1C06}

/* ── BASE PAGE ── */
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 24px 80px;position:relative;overflow:hidden}
.bg-glow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.07) 0%,transparent 65%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
.inner{position:relative;z-index:1;width:100%;max-width:480px}

/* Logo */
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:#FAF0DC;text-align:center;margin-bottom:40px;text-decoration:none;display:block}
.logo span{color:#C9A84C}

/* ── SCREENS ── */
.screen{display:none}
.screen.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── CHECKOUT SCREEN ── */
.match-banner{
  background:rgba(201,168,76,.06);border:.5px solid rgba(201,168,76,.18);
  border-radius:10px;padding:20px 22px;margin-bottom:20px;
  display:flex;align-items:center;gap:14px;
}
.match-av{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,rgba(201,168,76,.25),rgba(201,168,76,.06));
  border:1.5px solid rgba(201,168,76,.35);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#C9A84C;
}
.match-info .match-name{font-size:15px;font-weight:500;color:#FAF0DC;margin-bottom:2px}
.match-info .match-sub{font-size:12px;color:rgba(232,213,163,.45)}
.match-score{margin-left:auto;text-align:center;flex-shrink:0}
.match-score-num{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:#C9A84C;line-height:1}
.match-score-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(201,168,76,.4)}

/* Price card */
.price-card{
  background:#111005;border:1px solid rgba(201,168,76,.22);
  border-radius:12px;padding:28px 24px;margin-bottom:20px;text-align:center;
}
.price-eyebrow{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,168,76,.4);margin-bottom:8px}
.price-amount{font-family:'Cormorant Garamond',serif;font-size:68px;font-weight:400;color:#C9A84C;line-height:1;margin-bottom:4px}
.price-currency{font-size:16px;vertical-align:top;margin-top:14px;display:inline-block;color:rgba(201,168,76,.6)}
.price-desc{font-size:13px;color:rgba(232,213,163,.4);line-height:1.65;max-width:280px;margin:6px auto 20px}

/* Features list */
.feature-list{display:flex;flex-direction:column;gap:9px;margin-bottom:22px;text-align:left}
.feature-item{display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(232,213,163,.6)}
.feature-ico{width:22px;height:22px;border-radius:50%;background:rgba(201,168,76,.12);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;color:#C9A84C}

/* Pay button */
.pay-btn{
  width:100%;padding:16px;background:#C9A84C;color:#0C0902;
  border:none;border-radius:4px;font-family:'Jost',sans-serif;
  font-size:14px;font-weight:500;letter-spacing:.04em;cursor:pointer;
  transition:background .2s;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:12px;
}
.pay-btn:hover{background:#E8D5A3}
.pay-btn:disabled{opacity:.5;cursor:not-allowed}
.pay-btn .spin{width:16px;height:16px;border:2px solid transparent;border-top-color:#0C0902;border-radius:50%;animation:spin .7s linear infinite;display:none}
.pay-btn.loading .spin{display:block}
.pay-btn.loading .btn-lbl{opacity:.7}
@keyframes spin{to{transform:rotate(360deg)}}

.security-note{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:11px;color:rgba(232,213,163,.22);margin-bottom:20px;
}

/* Price comparison (Gold upsell) */
.gold-upsell{
  background:rgba(201,168,76,.04);border:.5px solid rgba(201,168,76,.15);
  border-radius:8px;padding:14px 16px;margin-bottom:14px;
}
.gold-upsell-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.gold-upsell-title{font-size:12px;font-weight:500;color:rgba(201,168,76,.8)}
.gold-badge{background:rgba(201,168,76,.15);color:rgba(201,168,76,.9);padding:2px 8px;border-radius:2px;font-size:10px;font-weight:600;letter-spacing:.06em}
.gold-upsell p{font-size:11.5px;color:rgba(232,213,163,.38);line-height:1.6;margin-bottom:10px}
.gold-upsell-btn{font-size:11px;color:rgba(201,168,76,.7);background:none;border:.5px solid rgba(201,168,76,.25);border-radius:3px;padding:5px 12px;cursor:pointer;font-family:'Jost',sans-serif;transition:all .2s}
.gold-upsell-btn:hover{background:rgba(201,168,76,.08);color:rgba(201,168,76,.9)}

.back-link{display:block;text-align:center;font-size:12px;color:rgba(232,213,163,.3);cursor:pointer;transition:color .2s;margin-top:8px;background:none;border:none;font-family:'Jost',sans-serif}
.back-link:hover{color:rgba(232,213,163,.6)}

/* ── PROCESSING SCREEN ── */
.processing-wrap{text-align:center;padding:40px 0}
.processing-spinner{
  width:60px;height:60px;border:3px solid rgba(201,168,76,.15);
  border-top-color:#C9A84C;border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 24px;
}
.processing-wrap h2{font-family:'Cormorant Garamond',serif;font-size:28px;color:#FAF0DC;margin-bottom:8px}
.processing-wrap p{font-size:13px;color:rgba(232,213,163,.4);line-height:1.7}

/* ── SUCCESS SCREEN ── */
.success-icon{
  width:72px;height:72px;border-radius:50%;margin:0 auto 20px;
  background:rgba(39,174,96,.12);border:1.5px solid rgba(39,174,96,.35);
  display:flex;align-items:center;justify-content:center;font-size:28px;
}
.success-h{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;color:#FAF0DC;line-height:1.1;margin-bottom:8px;text-align:center}
.success-h em{font-style:italic;color:#C9A84C}
.success-p{font-size:14px;color:rgba(232,213,163,.5);line-height:1.75;text-align:center;margin-bottom:26px}

.receipt-box{
  background:rgba(201,168,76,.05);border:.5px solid rgba(201,168,76,.18);
  border-radius:8px;padding:18px 20px;margin-bottom:20px;
}
.receipt-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.38);margin-bottom:12px}
.receipt-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid rgba(201,168,76,.08);font-size:13px}
.receipt-row:last-child{border-bottom:none;font-weight:500;padding-top:10px;margin-top:2px}
.receipt-key{color:rgba(232,213,163,.45)}
.receipt-val{color:rgba(232,213,163,.8);font-family:'Jost',sans-serif}
.receipt-val.gold{color:#C9A84C}

.success-actions{display:flex;flex-direction:column;gap:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:4px;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .2s;width:100%;text-decoration:none}
.btn-gold{background:#C9A84C;color:#0C0902}
.btn-gold:hover{background:#E8D5A3}
.btn-outline{background:transparent;color:rgba(232,213,163,.6);border:.5px solid rgba(201,168,76,.25)}
.btn-outline:hover{background:rgba(201,168,76,.07)}

/* ── CANCELLED SCREEN ── */
.cancelled-icon{font-size:40px;text-align:center;margin-bottom:16px}
.cancelled-h{font-family:'Cormorant Garamond',serif;font-size:28px;color:#FAF0DC;text-align:center;margin-bottom:8px}
.cancelled-p{font-size:14px;color:rgba(232,213,163,.45);line-height:1.7;text-align:center;margin-bottom:24px}

/* ── PAYMENT HISTORY ── */
.history-section{margin-top:8px}
.history-h{font-family:'Cormorant Garamond',serif;font-size:26px;color:#FAF0DC;margin-bottom:20px}
.payment-item{
  background:rgba(255,255,255,.03);border:.5px solid rgba(201,168,76,.12);
  border-radius:8px;padding:16px 18px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
}
.payment-ico{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.ico-unlock{background:rgba(39,174,96,.1)}
.ico-gold{background:rgba(201,168,76,.1)}
.ico-refund{background:rgba(122,26,26,.1)}
.payment-body{flex:1;min-width:0}
.payment-title{font-size:13px;font-weight:500;color:rgba(232,213,163,.8);margin-bottom:2px}
.payment-date{font-size:11px;color:rgba(232,213,163,.3)}
.payment-amount{font-family:'Cormorant Garamond',serif;font-size:18px;color:#C9A84C;font-weight:500;flex-shrink:0}
.payment-amount.refund{color:rgba(232,100,100,.7)}
.payment-status{font-size:10px;padding:2px 8px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;margin-top:4px;display:inline-block}
.status-ok{background:rgba(39,174,96,.1);color:rgba(39,174,96,.8)}
.status-pending{background:rgba(201,168,76,.1);color:rgba(201,168,76,.8)}
.status-refund{background:rgba(122,26,26,.1);color:rgba(180,80,80,.8)}
.empty-history{text-align:center;padding:40px 0;color:rgba(232,213,163,.25);font-size:14px}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#1A1208;color:#E8D5A3;padding:10px 20px;border-radius:3px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;border:.5px solid rgba(201,168,76,.22)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .page{padding:32px 16px 60px}
  .price-amount{font-size:54px}
}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="page">
  <a class="logo" href="#"><img src="/assets/logo.png" alt="Hassabe" style="height:36px;width:auto;vertical-align:middle"></a>
  <div class="inner" id="inner">
    <!-- Screen injected by JS -->
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';

/* ══════════════════════════════════════════════════════════
   CONFIG — replace with your backend URL
   ══════════════════════════════════════════════════════════ */
const API             = window.HASSABE_CONFIG.API;
const STRIPE_PUB_KEY  = 'pk_test_51TIxI9PbZCQ32RLHCqlPEC8TT1AUu1Aj45uNGbO3ovUE755eugbRSBc4fluKGMTmCcG8x7YywMpVCOarXcOVQNDN00KdgLW47s'; // replace with live key in production

/* ══════════════════════════════════════════════════════════
   READ URL PARAMS
   Supports:
     /payment?matchId=xxx              → checkout flow
     /payment/success?session_id=xxx   → success screen
     /payment?cancelled=true           → cancelled screen
     /payment/history                  → payment history
   ══════════════════════════════════════════════════════════ */
const params     = new URLSearchParams(window.location.search);
const matchId    = params.get('matchId');
const sessionId  = params.get('session_id');
const cancelled  = params.get('cancelled') === 'true';
const isHistory  = window.location.pathname.includes('history');
const isSuccess  = window.location.pathname.includes('success') || !!sessionId;

/* ══════════════════════════════════════════════════════════
   MOCK DATA (replaced by API calls in production)
   ══════════════════════════════════════════════════════════ */
const MOCK_MATCH = {
  id:           'match-001',
  score:        91,
  partnerName:  'Sara',
  partnerInitials: 'SR',
  partnerSub:   '30 · Physician · Toronto',
};

const MOCK_HISTORY = [
  { id:'p1', type:'conversation_unlock', status:'succeeded', amount:4999, currency:'usd',
    partnerName:'Yonas', createdAt: new Date(Date.now()-2*24*3600000).toISOString() },
  { id:'p2', type:'conversation_unlock', status:'refunded',  amount:4999, currency:'usd',
    partnerName:'Daniel', createdAt: new Date(Date.now()-15*24*3600000).toISOString() },
];

/* ══════════════════════════════════════════════════════════
   ROUTER
   ══════════════════════════════════════════════════════════ */
(function init() {
  if (isHistory)         return renderHistory();
  if (isSuccess)         return renderSuccess();
  if (cancelled)         return renderCancelled();
  if (matchId)           return renderCheckout(matchId);
  renderHistory(); // default: show history
})();

/* ══════════════════════════════════════════════════════════
   CHECKOUT SCREEN
   ══════════════════════════════════════════════════════════ */
async function renderCheckout(mId) {
  let match = MOCK_MATCH;
  try {
    const res = await fetch(`${API}/api/matches/${mId}`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('hassabe_token')}` }
    });
    if (res.ok) {
      const data = await res.json();
      const m = data.match || data;
      match = {
        id:              mId,
        score:           Math.round(m.score || m.r1_score || 0) || 0,
        partnerName:     m.person?.firstName || 'Your Match',
        partnerInitials: (m.person?.firstName || 'M')[0].toUpperCase(),
        partnerSub:      [m.person?.age, m.person?.profession, m.person?.city].filter(Boolean).join(' · '),
      };
    }
  } catch (e) { /* use mock fallback */ }

  document.getElementById('inner').innerHTML = `
    <div class="screen active" id="screen-checkout">

      <!-- Match banner -->
      <div class="match-banner">
        <div class="match-av">${match.partnerInitials}</div>
        <div class="match-info">
          <div class="match-name">${match.partnerName}</div>
          <div class="match-sub">${match.partnerSub}</div>
        </div>
        <div class="match-score">
          <div class="match-score-num">${match.score}%</div>
          <div class="match-score-lbl">Match</div>
        </div>
      </div>

      <!-- Price card -->
      <div class="price-card">
        <div class="price-eyebrow">One-time unlock</div>
        <div><span class="price-currency">$</span><span class="price-amount">49</span><span class="price-currency">.99</span></div>
        <div class="price-desc">Unlock your private conversation with ${match.partnerName}. No subscription. No recurring charges.</div>

        <div class="feature-list">
          <div class="feature-item"><div class="feature-ico">💬</div>30-day private messaging window</div>
          <div class="feature-item"><div class="feature-ico">✦</div>3 AI-generated icebreaker questions</div>
          <div class="feature-item"><div class="feature-ico">👤</div>Full profile access for ${match.partnerName}</div>
          <div class="feature-item"><div class="feature-ico">🎙</div>Voice note support</div>
        </div>

        <button class="pay-btn" id="pay-btn" onclick="startCheckout('${mId}')">
          <div class="spin"></div>
          <span class="btn-lbl">Continue to payment →</span>
        </button>
        <div class="security-note">🔒 Secured by Stripe &nbsp;·&nbsp; No card stored &nbsp;·&nbsp; 256-bit encryption</div>
      </div>

      <!-- Gold upsell -->
      <div class="gold-upsell">
        <div class="gold-upsell-hdr">
          <div class="gold-upsell-title">✦ Hassabe Gold</div>
          <div class="gold-badge">$19.99/mo</div>
        </div>
        <p>Gold includes unlimited unlocks, priority in the match queue, and up to 5 simultaneous matches. Unlocks pay for themselves in month 2.</p>
        <button class="gold-upsell-btn" onclick="goToGold()">Learn about Gold →</button>
      </div>

      <button class="back-link" onclick="window.history.back()">← Back to matches</button>
    </div>`;
}

async function startCheckout(mId) {
  const btn = document.getElementById('pay-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/api/payments/checkout/${mId}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('hassabe_token')}`
      }
    });
    if (!res.ok) {
      const err = await res.json();
      toast(err.error || 'Payment failed to start. Please try again.');
      btn.classList.remove('loading'); btn.disabled = false;
      return;
    }
    const { checkoutUrl } = await res.json();
    showProcessing();
    window.location.href = checkoutUrl;

  } catch (err) {
    toast('Something went wrong. Please try again.');
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

/* ══════════════════════════════════════════════════════════
   PROCESSING SCREEN (shown while redirecting)
   ══════════════════════════════════════════════════════════ */
function showProcessing() {
  document.getElementById('inner').innerHTML = `
    <div class="screen active" id="screen-processing">
      <div class="processing-wrap">
        <div class="processing-spinner"></div>
        <h2>Opening Stripe…</h2>
        <p>You will be redirected to a secure Stripe checkout page. Do not close this window.</p>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════
   SUCCESS SCREEN
   ══════════════════════════════════════════════════════════ */
async function renderSuccess(data = {}) {
  let partnerName = data.partnerName || 'your match';
  let score       = data.score || 0;
  const amount    = '$49.99';
  if (sessionId) {
    try {
      const res = await fetch(`${API}/api/payments/verify-session?session_id=${sessionId}`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('hassabe_token')}` }
      });
      if (res.ok) {
        const { payment, match: m } = await res.json();
        if (m?.person?.firstName) partnerName = m.person.firstName;
        if (m?.score)             score       = Math.round(m.score);
      }
    } catch (e) { /* use defaults */ }
  }
  const now         = new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
  const receiptId   = `#${Math.random().toString(36).slice(2,10).toUpperCase()}`;

  document.getElementById('inner').innerHTML = `
    <div class="screen active" id="screen-success">
      <div style="text-align:center">
        <div class="success-icon">💬</div>
        <h1 class="success-h">Conversation<br><em>unlocked</em></h1>
        <p class="success-p">Your private conversation with ${partnerName} is now open for 30 days. Your AI icebreakers are waiting inside.</p>
      </div>

      <div class="receipt-box">
        <div class="receipt-label">Payment Confirmed</div>
        <div class="receipt-row">
          <span class="receipt-key">Date</span>
          <span class="receipt-val">${now}</span>
        </div>
        <div class="receipt-row">
          <span class="receipt-key">Match score</span>
          <span class="receipt-val">${score}% compatibility</span>
        </div>
        <div class="receipt-row">
          <span class="receipt-key">Window</span>
          <span class="receipt-val">30 days</span>
        </div>
        <div class="receipt-row">
          <span class="receipt-key">Receipt</span>
          <span class="receipt-val">${receiptId}</span>
        </div>
        <div class="receipt-row">
          <span class="receipt-key">Total charged</span>
          <span class="receipt-val gold">${amount}</span>
        </div>
      </div>

      <div class="success-actions">
        <a class="btn btn-gold" href="/messages?matchId=${matchId || 'match-001'}">
          Open Conversation with ${partnerName} →
        </a>
        <button class="btn btn-outline" onclick="renderHistory()">View payment history</button>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════
   CANCELLED SCREEN
   ══════════════════════════════════════════════════════════ */
function renderCancelled() {
  document.getElementById('inner').innerHTML = `
    <div class="screen active" id="screen-cancelled">
      <div class="cancelled-icon">—</div>
      <h2 class="cancelled-h">Payment cancelled</h2>
      <p class="cancelled-p">No charge was made. Your match is still approved and waiting when you are ready.</p>
      <div class="success-actions">
        <button class="btn btn-gold" onclick="renderCheckout('${matchId}')">Try again →</button>
        <a class="btn btn-outline" href="/matches">Back to matches</a>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════════════════
   PAYMENT HISTORY
   ══════════════════════════════════════════════════════════ */
async function renderHistory() {
  let payments = [];
  try {
    const res = await fetch(`${API}/api/payments/history`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('hassabe_token')}` }
    });
    if (res.ok) {
      const data = await res.json();
      payments = data.payments || [];
    }
  } catch (e) { payments = []; }

  const itemsHtml = payments.length
    ? payments.map(p => {
        const isRefund  = p.status === 'refunded';
        const isGold    = p.type === 'gold_subscription';
        const ico       = isGold ? '✦' : isRefund ? '↩' : '💬';
        const icoClass  = isGold ? 'ico-gold' : isRefund ? 'ico-refund' : 'ico-unlock';
        const title     = isGold ? 'Gold Subscription' : `Conversation unlock — ${p.partnerName}`;
        const date      = new Date(p.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        const amt       = `$${(p.amount / 100).toFixed(2)}`;
        const statusHtml = {
          succeeded: `<div class="payment-status status-ok">Paid</div>`,
          pending:   `<div class="payment-status status-pending">Pending</div>`,
          refunded:  `<div class="payment-status status-refund">Refunded</div>`,
          failed:    `<div class="payment-status status-refund">Failed</div>`,
        }[p.status] || '';

        return `
          <div class="payment-item">
            <div class="payment-ico ${icoClass}">${ico}</div>
            <div class="payment-body">
              <div class="payment-title">${title}</div>
              <div class="payment-date">${date}</div>
              ${statusHtml}
            </div>
            <div class="payment-amount ${isRefund ? 'refund' : ''}">${isRefund ? `−${amt}` : amt}</div>
          </div>`;
      }).join('')
    : `<div class="empty-history">No payments yet</div>`;

  document.getElementById('inner').innerHTML = `
    <div class="screen active" id="screen-history">
      <div class="history-section">
        <h2 class="history-h">Payment History</h2>
        ${itemsHtml}
        <button class="back-link" onclick="window.history.back()" style="margin-top:20px">← Back</button>
      </div>
    </div>`;
}

function goToGold() {
  toast('Redirecting to Gold subscription page…');
  window.location.href = '/settings/subscription';
}

/* ══════════════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════════════ */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let toastT;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
